<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Boot</title>
  <link rel="icon" href="../assets/favicon.ico" />
  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <script defer src="boot.js"></script>
</head>
<body class="boot-body">
  <div class="boot-overlay glass">
    <div class="boot-logo">
      <img src="../assets/jason.png" alt="JASON OS Logo" />
      <h1 class="boot-title">JASON OS</h1>
      <p class="boot-subtitle" id="boot-subtitle">Welcome to Tahoe.</p>
    </div>

    <form class="boot-form" id="boot-form">
      <div class="boot-tabs">
        <button type="button" class="boot-tab active" data-mode="signin">Sign In</button>
        <button type="button" class="boot-tab" data-mode="signup">Sign Up</button>
      </div>

      <div class="boot-fields">
        <input type="text" id="boot-name" placeholder="Display name" required />
        <input type="email" id="boot-email" placeholder="Email" required />
        <input type="password" id="boot-password" placeholder="Password" required />
        <input type="password" id="boot-confirm" placeholder="Confirm Password" class="hidden" />
      </div>

      <button type="submit" class="boot-submit" id="boot-submit">Continue</button>
    </form>
  </div>
</body>
</html>
