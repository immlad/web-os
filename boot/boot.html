<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="boot.css" />
</head>
<body class="theme-cloud">
  <div id="boot-overlay"></div>

  <div id="boot-container">
    <div id="boot-glass">
      <h1>JASON OS</h1>
      <p class="boot-subtitle">Tahoe Account Edition</p>

      <div id="boot-tabs">
        <button class="boot-tab active" data-mode="login">Login</button>
        <button class="boot-tab" data-mode="signup">Create Account</button>
      </div>

      <form id="boot-form">
        <div class="boot-field">
          <label>Username</label>
          <input id="boot-username" autocomplete="off" />
        </div>
        <div class="boot-field">
          <label>Password</label>
          <input id="boot-password" type="password" />
        </div>

        <div class="boot-field boot-admin-toggle hidden" id="boot-admin-toggle">
          <label>
            <input type="checkbox" id="boot-admin-checkbox" />
            Make this user admin
          </label>
        </div>

        <button type="submit" id="boot-submit-btn">Login</button>
        <p id="boot-error" class="boot-error hidden"></p>
      </form>
    </div>
  </div>

  <script src="boot.js"></script>
</body>
</html>
