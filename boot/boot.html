<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Boot</title>
  <link rel="icon" href="../assets/favicon.ico" />
  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <script defer src="boot.js"></script>
</head>
<body class="boot-body">
  <div class="boot-overlay glass">
    <div class="boot-logo">
      <img src="../assets/jason.png" alt="JASON OS Logo" />
      <h1 class="boot-title">JASON OS</h1>
      <p class="boot-subtitle">Create your account</p>
    </div>

    <form class="boot-form" id="boot-form">
      <div class="boot-fields">
        <input type="text" id="boot-name" placeholder="Enter your name" required />
        <input type="password" id="boot-password" placeholder="Password" required />
      </div>

      <button type="submit" class="boot-submit">Create Account</button>
    </form>
  </div>
</body>
</html>
