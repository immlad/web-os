<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jason OS – Boot</title>

  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <script defer src="boot.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body class="boot-body">

  <div class="os-wallpaper"></div>

  <div class="boot-center">
    <div class="boot-container glass">

      <img src="../assets/jason.png" class="boot-logo" />

      <h1 class="boot-title">Jason OS</h1>
      <p class="boot-subtitle">Windows 11 Gaming Edition</p>

      <div class="boot-progress">
        <div id="boot-bar" class="boot-bar"></div>
      </div>

      <p class="boot-hint">Starting up...</p>

    </div>
  </div>

</body>
</html>
