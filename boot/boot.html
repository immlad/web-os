<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Login</title>
  <link rel="stylesheet" href="../css/app.css" />
</head>
<body class="boot-wallpaper">

  <div id="boot-container">
    <div id="boot-card">

      <h1>JASON OS</h1>
      <p class="subtitle">Account Edition</p>

      <div id="tabs">
        <button class="tab active" data-mode="login">Login</button>
        <button class="tab" data-mode="signup">Create Account</button>
      </div>

      <form id="boot-form">
        <div class="field">
          <label>Username</label>
          <input id="username" autocomplete="off" />
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" type="password" />
        </div>

        <div id="admin-toggle" class="field hidden">
          <label>
            <input type="checkbox" id="admin-checkbox" />
            Make this user admin
          </label>
        </div>

        <button id="submit-btn" type="submit">Login</button>
        <p id="error" class="error hidden"></p>
      </form>

    </div>
  </div>

  <script src="boot.js"></script>
</body>
</html>
