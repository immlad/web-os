<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jason OS Boot</title>
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../css/index.css">
</head>
<body class="boot-body">
  <div class="boot-screen">
    <div class="boot-glow"></div>
    <img src="../assets/favicon.ico" class="boot-logo" alt="Logo">
    <div class="boot-title">Jason OS</div>
    <div class="boot-subtitle">Booting...</div>
    <div class="boot-bar">
      <div class="boot-bar-fill" id="bootBarFill"></div>
    </div>
    <div class="boot-log" id="bootLog"></div>
  </div>

  <script src="boot.js"></script>
</body>
</html>
