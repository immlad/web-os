<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jason OS Global Chat</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div class="chat-root">
    <div class="chat-sidebar">
      <div class="chat-logo">Global Chat</div>
      <div class="chat-channel"># general</div>
      <div class="chat-hint">Messages sync across tabs on this browser.</div>
    </div>
    <div class="chat-main">
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chatInput" type="text" placeholder="Message #general">
        <button id="chatSend">Send</button>
      </div>
    </div>
  </div>
</body>
</html>
