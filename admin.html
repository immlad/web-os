<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jason OS Admin</title>
  <link rel="icon" type="image/x-icon" href="assets/app-default.png">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1b1f3b, #05060a);
      color: #fff;
      font-size: 14px;
    }
    .root {
      padding: 16px 18px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    h2 {
      margin-top: 18px;
      margin-bottom: 6px;
      font-size: 16px;
    }
    .pending-list, .approved-list, .users-list, .banned-list, .messages-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
      width: 260px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .card-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    button {
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      background: linear-gradient(135deg, #ff4ecd, #4e9bff);
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    button.secondary {
      background: rgba(255,255,255,0.12);
    }
    a {
      color: #8fd4ff;
      font-size: 12px;
      word-break: break-all;
    }
    .global-message-form {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .global-message-form input {
      flex: 1;
      min-width: 200px;
      padding: 6px 8px;
      border-radius: 8px;
      border: none;
      outline: none;
    }
    .message-card {
      width: 260px;
    }
  </style>
</head>
<body>
  <div class="root">
    <h1>Jason OS Admin</h1>
    <p>Manage users, apps, bans, and global messages.</p>

    <h2>Pending Apps</h2>
    <div id="pending" class="pending-list"></div>

    <h2>Approved Apps</h2>
    <div id="approved" class="approved-list"></div>

    <h2>Users</h2>
    <div id="users" class="users-list"></div>

    <h2>Banned Users</h2>
    <div id="banned" class="banned-list"></div>

    <h2>Global Messages</h2>
    <div class="global-message-form">
      <input id="globalMessageInput" type="text" placeholder="Enter a global message...">
      <button id="globalMessageSend">Send</button>
    </div>
    <div id="messages" class="messages-list"></div>
  </div>

  <script>
    function getPendingApps() {
      try {
        return JSON.parse(localStorage.getItem("jason_pending_apps") || "[]");
      } catch {
        return [];
      }
    }

    function savePendingApps(list) {
      localStorage.setItem("jason_pending_apps", JSON.stringify(list));
    }

    function getCustomApps() {
      try {
        return JSON.parse(localStorage.getItem("jason_custom_apps") || "[]");
      } catch {
        return [];
      }
    }

    function saveCustomApps(list) {
      localStorage.setItem("jason_custom_apps", JSON.stringify(list));
    }

    function getUsers() {
      try {
        return JSON.parse(localStorage.getItem("jason_users") || "[]");
      } catch {
        return [];
      }
    }

    function saveUsers(list) {
      localStorage.setItem("jason_users", JSON.stringify(list));
    }

    function getBannedUsers() {
      try {
        return JSON.parse(localStorage.getItem("jason_banned_users") || "[]");
      } catch {
        return [];
      }
    }

    function saveBannedUsers(list) {
      localStorage.setItem("jason_banned_users", JSON.stringify(list));
    }

    function getGlobalMessages() {
      try {
        return JSON.parse(localStorage.getItem("jason_global_messages") || "[]");
      } catch {
        return [];
      }
    }

    function saveGlobalMessages(list) {
      localStorage.setItem("jason_global_messages", JSON.stringify(list));
    }

    function renderApps() {
      const pendingRoot = document.getElementById("pending");
      const approvedRoot = document.getElementById("approved");
      pendingRoot.innerHTML = "";
      approvedRoot.innerHTML = "";

      const pending = getPendingApps();
      const approved = getCustomApps();

      if (!pending.length) {
        pendingRoot.innerHTML = '<div style="opacity:0.8;">No pending apps.</div>';
      } else {
        pending.forEach((app, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-title">${app.name}</div>
            <div>URL: <a href="${app.url}" target="_blank">${app.url}</a></div>
            <div>Icon: ${app.icon || "(default)"}</div>
            <div>Submitted by: ${app.submittedBy || "unknown"}</div>
          `;
          const approveBtn = document.createElement("button");
          approveBtn.textContent = "Approve";
          approveBtn.onclick = () => {
            const p = getPendingApps();
            const a = getCustomApps();
            const item = p.splice(index, 1)[0];
            a.push({
              name: item.name,
              url: item.url,
              icon: item.icon
            });
            savePendingApps(p);
            saveCustomApps(a);
            renderApps();
          };

          const rejectBtn = document.createElement("button");
          rejectBtn.textContent = "Reject";
          rejectBtn.className = "secondary";
          rejectBtn.style.marginLeft = "6px";
          rejectBtn.onclick = () => {
            const p = getPendingApps();
            p.splice(index, 1);
            savePendingApps(p);
            renderApps();
          };

          card.appendChild(approveBtn);
          card.appendChild(rejectBtn);
          pendingRoot.appendChild(card);
        });
      }

      if (!approved.length) {
        approvedRoot.innerHTML = '<div style="opacity:0.8;">No approved apps yet.</div>';
      } else {
        approved.forEach(app => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-title">${app.name}</div>
            <div>URL: <a href="${app.url}" target="_blank">${app.url}</a></div>
            <div>Icon: ${app.icon || "(default)"}</div>
          `;
          approvedRoot.appendChild(card);
        });
      }
    }

    function renderUsers() {
      const usersRoot = document.getElementById("users");
      const bannedRoot = document.getElementById("banned");
      usersRoot.innerHTML = "";
      bannedRoot.innerHTML = "";

      const users = getUsers();
      const banned = getBannedUsers();

      if (!users.length) {
        usersRoot.innerHTML = '<div style="opacity:0.8;">No users.</div>';
      } else {
        users.forEach((u, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-title">${u.username}</div>
            <div>Password: ${u.password}</div>
          `;
          const deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Delete";
          deleteBtn.onclick = () => {
            const list = getUsers();
            list.splice(index, 1);
            saveUsers(list);
            renderUsers();
          };

          const banBtn = document.createElement("button");
          banBtn.textContent = "Ban";
          banBtn.className = "secondary";
          banBtn.style.marginLeft = "6px";
          banBtn.onclick = () => {
            const list = getUsers();
            const user = list.splice(index, 1)[0];
            saveUsers(list);
            const b = getBannedUsers();
            if (!b.includes(user.username.toLowerCase())) {
              b.push(user.username.toLowerCase());
              saveBannedUsers(b);
            }
            renderUsers();
          };

          card.appendChild(deleteBtn);
          card.appendChild(banBtn);
          usersRoot.appendChild(card);
        });
      }

      const bannedList = getBannedUsers();
      if (!bannedList.length) {
        bannedRoot.innerHTML = '<div style="opacity:0.8;">No banned users.</div>';
      } else {
        bannedList.forEach((name, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-title">${name}</div>
          `;
          const unbanBtn = document.createElement("button");
          unbanBtn.textContent = "Unban";
          unbanBtn.onclick = () => {
            const b = getBannedUsers();
            b.splice(index, 1);
            saveBannedUsers(b);
            renderUsers();
          };
          card.appendChild(unbanBtn);
          bannedRoot.appendChild(card);
        });
      }
    }

    function renderMessages() {
      const messagesRoot = document.getElementById("messages");
      messagesRoot.innerHTML = "";
      const msgs = getGlobalMessages();
      if (!msgs.length) {
        messagesRoot.innerHTML = '<div style="opacity:0.8;">No global messages.</div>';
        return;
      }
      msgs.forEach(msg => {
        const card = document.createElement("div");
        card.className = "card message-card";
        card.innerHTML = `
          <div class="card-title">${msg.text}</div>
          <div style="font-size:12px;opacity:0.8;">By: ${msg.author || "admin"} • ${new Date(msg.time).toLocaleString()}</div>
        `;
        messagesRoot.appendChild(card);
      });
    }

    function initGlobalMessageForm() {
      const input = document.getElementById("globalMessageInput");
      const btn = document.getElementById("globalMessageSend");

      btn.onclick = () => {
        const text = input.value.trim();
        if (!text) return;
        const msgs = getGlobalMessages();
        msgs.push({
          text,
          author: "admin",
          time: Date.now()
        });
        saveGlobalMessages(msgs);
        input.value = "";
        renderMessages();
      };
    }

    function renderAll() {
      renderApps();
      renderUsers();
      renderMessages();
    }

    renderAll();
    initGlobalMessageForm();
  </script>
</body>
</html>
