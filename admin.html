<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jason OS – Admin</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" />
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/app.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    window.addEventListener("load", () => {
      const isAdmin = sessionStorage.getItem("jason_admin") === "true";
      if (!isAdmin) {
        window.location.href = "boot/boot.html";
      }
    });
  </script>
</head>
<body class="os-body">
  <div class="os-wallpaper"></div>

  <div class="admin-shell">
    <div class="top-bar glass">
      <div class="top-left">
        <span class="logo-dot red"></span>
        <span class="logo-dot amber"></span>
        <span class="logo-dot green"></span>
        <span class="logo-text">Jason OS Admin</span>
      </div>
      <div class="top-center">
        <span class="top-pill glass-soft">Root Access</span>
      </div>
      <div class="top-right">
        <span class="status-indicator admin"></span>
        <span class="status-text">Privileged</span>
      </div>
    </div>

    <div class="admin-panel glass centered">
      <h1>Admin Control Center</h1>
      <p class="muted">You are running Jason OS in elevated mode.</p>

      <div class="admin-grid">
        <div class="admin-card glass-soft">
          <h3>Users</h3>
          <p class="muted-small">Manage sessions, roles, and access.</p>
        </div>
        <div class="admin-card glass-soft">
          <h3>Processes</h3>
          <p class="muted-small">Monitor running apps and services.</p>
        </div>
        <div class="admin-card glass-soft">
          <h3>Appearance</h3>
          <p class="muted-small">Liquid glass theme is locked on.</p>
        </div>
        <div class="admin-card glass-soft">
          <h3>Power</h3>
          <p class="muted-small">Reboot or shutdown Jason OS.</p>
        </div>
      </div>

      <button class="btn-primary" onclick="window.location.href='index.html'">
        Back to Desktop
      </button>
    </div>
  </div>
</body>
</html>
