<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Tahoe Desktop</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <div id="global-message" class="hidden"></div>

  <div id="topbar">
    <div id="topbar-left">
      <span class="pill">Pages</span>
      <span class="pill">JASON OS</span>
    </div>
    <div id="topbar-center">
      <span id="clock"></span>
    </div>
    <div id="topbar-right">
      <span id="username"></span>
      <span id="admin-badge" class="admin hidden">Admin</span>
    </div>
  </div>

  <div id="desktop">
    <h1>JASON OS</h1>
    <p id="phrase"></p>
  </div>

  <div id="windows"></div>

  <div id="dock">
    <div class="dock-item" data-app="chat">💬</div>
    <div class="dock-item" data-app="settings">⚙️</div>
    <div class="dock-item" data-app="admin">🛠️</div>
    <div class="dock-item" data-app="about">❓</div>
    <div class="dock-item" data-app="logout">⏻</div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
