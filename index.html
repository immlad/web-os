<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jason OS – Desktop</title>

  <!-- Icon -->
  <link rel="icon" href="assets/jason.png" />

  <!-- Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/app.css" />

  <!-- Scripts -->
  <script defer src="js/animations.js"></script>
  <script defer src="js/app.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body class="os-body">

  <!-- Wallpaper -->
  <div class="os-wallpaper"></div>

  <!-- DESKTOP ICONS (Liquid Glass) -->
  <div id="desktop-icons" class="desktop-icons">

    <button class="desktop-icon glass-soft" data-app="home">
      <div class="desktop-icon-img">🏠</div>
      <span>Home</span>
    </button>

    <button class="desktop-icon glass-soft" data-app="profile">
      <div class="desktop-icon-img">👤</div>
      <span>Profile</span>
    </button>

    <button class="desktop-icon glass-soft" data-app="settings">
      <div class="desktop-icon-img">⚙️</div>
      <span>Settings</span>
    </button>

    <button class="desktop-icon glass-soft" data-app="nebulo">
      <div class="desktop-icon-img nebulo-icon"></div>
      <span>Nebulo</span>
    </button>

    <button class="desktop-icon glass-soft" data-app="chat">
      <div class="desktop-icon-img">💬</div>
      <span>Chat</span>
    </button>

  </div>

  <!-- WINDOWS -->

  <!-- HOME -->
  <div id="home-window" class="window glass hidden">
    <div class="window-header">
      <span class="window-title">Home</span>
      <div class="window-controls">
        <span class="win-btn min"></span>
        <span class="win-btn max"></span>
        <span class="win-btn close"></span>
      </div>
    </div>
    <div class="window-body">
      <h1>Welcome to Jason OS</h1>
      <p>Your Windows‑11‑Gaming‑Edition desktop is ready.</p>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="profile-window" class="window glass hidden">
    <div class="window-header">
      <span class="window-title">Profile</span>
      <div class="window-controls">
        <span class="win-btn min"></span>
        <span class="win-btn max"></span>
        <span class="win-btn close"></span>
      </div>
    </div>
    <div class="window-body">
      <h2>Edit Profile</h2>
      <label>Username</label>
      <input id="edit-username" class="auth-input" />

      <label>Password</label>
      <input id="edit-password" type="password" class="auth-input" />

      <button id="save-profile" class="btn-primary">Save</button>
      <p id="profile-status" class="muted-small"></p>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settings-window" class="window glass hidden">
    <div class="window-header">
      <span class="window-title">Settings</span>
      <div class="window-controls">
        <span class="win-btn min"></span>
        <span class="win-btn max"></span>
        <span class="win-btn close"></span>
      </div>
    </div>
    <div class="window-body">
      <h2>Appearance</h2>
      <p class="muted-small">Choose your theme.</p>

      <div class="theme-grid">
        <button class="theme-btn" data-theme="forest">Forest</button>
        <button class="theme-btn" data-theme="night">Night</button>
        <button class="theme-btn" data-theme="cloud">Cloud</button>
        <button class="theme-btn" data-theme="jason">JASON</button>
      </div>
    </div>
  </div>

  <!-- NEBULO -->
  <div id="nebulo-window" class="window glass hidden">
    <div class="window-header">
      <span class="window-title">Nebulo</span>
      <div class="window-controls">
        <span class="win-btn min"></span>
        <span class="win-btn max"></span>
        <span class="win-btn close"></span>
      </div>
    </div>
    <div class="window-body iframe-body">
      <iframe src="https://nebulo.bostoncareercounselor.com" class="app-iframe"></iframe>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-window" class="window glass hidden">
    <div class="window-header">
      <span class="window-title">Chat</span>
      <div class="window-controls">
        <span class="win-btn min"></span>
        <span class="win-btn max"></span>
        <span class="win-btn close"></span>
      </div>
    </div>
    <div class="window-body iframe-body">
      <iframe src="https://immlad.github.io/liquid-aura/#/app" class="app-iframe"></iframe>
    </div>
  </div>

  <!-- macOS Dock -->
  <div id="dock" class="dock glass">

    <button class="dock-item" data-app="home">
      <div class="dock-icon">🏠</div>
    </button>

    <button class="dock-item" data-app="profile">
      <div class="dock-icon">👤</div>
    </button>

    <button class="dock-item" data-app="settings">
      <div class="dock-icon">⚙️</div>
    </button>

    <button class="dock-item" data-app="nebulo">
      <div class="dock-icon nebulo-icon"></div>
    </button>

    <button class="dock-item" data-app="chat">
      <div class="dock-icon">💬</div>
    </button>

  </div>

</body>
</html>
