<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jason OS</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="login-screen">
    <div class="login-card">
      <div class="login-glow"></div>
      <img src="assets/app-default.png" class="login-logo" alt="Jason OS Logo">
      <h1 class="login-title">Jason OS</h1>
      <div id="loginTagline" class="login-tagline"></div>

      <input id="usernameInput" type="text" placeholder="Username">
      <input id="passwordInput" type="password" placeholder="Password">

      <div class="auth-buttons">
        <button id="signupBtn">Sign Up</button>
        <button id="loginBtn">Login</button>
      </div>

      <div id="authMessage" class="auth-message"></div>
    </div>
  </div>

  <!-- DESKTOP -->
  <div id="desktop" class="desktop hidden">
    <div class="desktop-overlay">
      <div class="desktop-title">Jason OS</div>
      <div id="desktopTagline" class="desktop-tagline"></div>
    </div>

    <div class="status-bar">
      <div class="status-left">JASON OS</div>
      <div class="status-right">
        <button id="logoutBtn" class="logout-btn">Logout</button>
        <span id="statusClock"></span>
      </div>
    </div>
  </div>

  <!-- Dock -->
  <div id="dock" class="dock hidden"></div>

  <!-- Windows -->
  <div id="windows" class="windows hidden"></div>

  <!-- Mission Control overlay -->
  <div id="missionControlOverlay" class="mission-control-overlay hidden"></div>

  <script src="js/animations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
