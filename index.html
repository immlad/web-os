<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Tahoe Desktop</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script defer src="js/app.js"></script>
</head>
<body>
  <div class="desktop-wallpaper"></div>

  <header class="topbar glass">
    <div class="topbar-left">
      <span class="topbar-logo"></span>
      <span class="topbar-title">JASON OS TAHOE</span>
    </div>

    <div class="topbar-center topbar-pill">
      <span class="topbar-pill-item active">Desktop</span>
      <span class="topbar-pill-item">Apps</span>
      <span class="topbar-pill-item">Control Center</span>
    </div>

    <div class="topbar-right">
      <div id="topbar-admin-badge" class="topbar-admin-badge hidden">Admin</div>
      <span id="topbar-username" class="topbar-username"></span>
      <div class="app-switcher" id="app-switcher"></div>
      <span id="topbar-clock"></span>
    </div>
  </header>

  <div id="global-message" class="global-message glass hidden"></div>

  <div id="notification-banner" class="notification-banner glass hidden">
    <div class="nb-title">Notification</div>
    <div class="nb-body" id="notification-text"></div>
  </div>

  <main class="desktop">
    <section class="desktop-hero">
      <h1 class="desktop-title">JASON OS</h1>
      <p class="desktop-subtitle" id="desktop-phrase"></p>
    </section>
  </main>

  <div class="window glass hidden" id="window-about" data-app-window data-app-id="about">
    <div class="window-titlebar" data-drag-handle>
      <div class="window-controls">
        <button class="win-btn win-close"></button>
        <button class="win-btn win-minimize"></button>
        <button class="win-btn win-fullscreen"></button>
      </div>
      <span class="window-title">About JASON OS</span>
    </div>

    <div class="window-body about-body">
      <img src="assets/jason.png" class="about-logo" />
      <h1>JASON OS</h1>
      <p>Created by Minh</p>
      <p class="about-version">Version 1.0 (Tahoe)</p>
    </div>
  </div>

  <nav class="dock glass" id="dock">
    <div class="dock-inner" id="dock-inner">
      <button class="dock-item" draggable="true" data-app="nebulo">
        <img src="assets/icons/nebulo.png" class="dock-icon" />
        <div class="dock-label">Nebulo</div>
      </button>

      <button class="dock-item" draggable="true" data-app="chat">
        <img src="assets/icons/liquid-aura.png" class="dock-icon" />
        <div class="dock-label">Liquid Aura</div>
      </button>

      <button class="dock-item" draggable="true" data-app="ideas">
        <img src="assets/icons/ideas.png" class="dock-icon" />
        <div class="dock-label">Ideas</div>
      </button>

      <button class="dock-item" draggable="true" data-app="music">
        <img src="assets/icons/music.png" class="dock-icon" />
        <div class="dock-label">Music</div>
      </button>

      <button class="dock-item" draggable="true" data-app="settings">
        <img src="assets/icons/settings.png" class="dock-icon" />
        <div class="dock-label">Settings</div>
      </button>

      <button class="dock-item" draggable="true" data-app="admin">
        <img src="assets/icons/admin.png" class="dock-icon" />
        <div class="dock-label">Admin</div>
      </button>

      <button class="dock-item" draggable="true" data-app="about">
        <img src="assets/icons/about.png" class="dock-icon" />
        <div class="dock-label">About</div>
      </button>

      <button class="dock-item dock-logout" draggable="true" data-app="logout">
        <img src="assets/icons/logout.png" class="dock-icon" />
        <div class="dock-label">Logout</div>
      </button>
    </div>
  </nav>
</body>
</html>
