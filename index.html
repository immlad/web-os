<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JASON OS – Tahoe Desktop</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script defer src="js/app.js"></script>
</head>
<body>
  <div class="desktop-wallpaper"></div>

  <!-- Top bar -->
  <header class="topbar glass">
    <div class="topbar-left">
      <span class="topbar-logo"></span>
      <span class="topbar-title">JASON OS Tahoe</span>
    </div>
    <div class="topbar-center">
      <button class="topbar-theme-btn" data-theme="cloud">Cloud</button>
      <button class="topbar-theme-btn" data-theme="night">Night</button>
      <button class="topbar-theme-btn" data-theme="forest">Forest</button>
      <button class="topbar-theme-btn" data-theme="jason">JASON</button>
    </div>
    <div class="topbar-right">
      <div class="app-switcher" id="app-switcher"></div>
      <span id="topbar-clock"></span>
    </div>
  </header>

  <!-- Desktop layout -->
  <main class="desktop">
    <!-- Left app rail (like FroggieOS, but no frog) -->
    <aside class="desktop-rail glass">
      <div class="rail-title">Apps</div>

      <button class="rail-item" data-app="nebulo">
        <img src="assets/app-default.png" class="rail-icon app-icon" alt="Nebulo" />
        <span class="rail-label">Nebulo</span>
      </button>

      <button class="rail-item" data-app="chat">
        <img src="assets/app-default.png" class="rail-icon app-icon" alt="Liquid Aura" />
        <span class="rail-label">Liquid Aura</span>
      </button>

      <button class="rail-item" data-app="ideas">
        <img src="assets/app-default.png" class="rail-icon app-icon" alt="Ideas" />
        <span class="rail-label">Ideas</span>
      </button>

      <button class="rail-item" data-app="settings">
        <img src="assets/app-default.png" class="rail-icon app-icon" alt="Settings" />
        <span class="rail-label">Settings</span>
      </button>

      <button class="rail-item" data-app="admin">
        <img src="assets/app-default.png" class="rail-icon app-icon" alt="Admin" />
        <span class="rail-label">Admin (55)</span>
      </button>
    </aside>

    <!-- Center hero -->
    <section class="desktop-hero">
      <h1 class="desktop-title">JASON OS</h1>
      <p class="desktop-subtitle" id="desktop-phrase"></p>
    </section>
  </main>

  <!-- App windows -->
  <div class="window glass hidden" id="window-nebulo" data-app-window data-app-id="nebulo">
    <div class="window-titlebar" data-drag-handle>
      <div class="window-controls">
        <button class="win-btn win-close" data-close>&nbsp;</button>
        <button class="win-btn win-minimize">&nbsp;</button>
        <button class="win-btn win-full">&nbsp;</button>
      </div>
      <span class="window-title">Nebulo</span>
    </div>
    <div class="window-body">
      <iframe
        src="https://nebulo.bostoncareercounselor.com"
        title="Nebulo"
        class="window-iframe"
      ></iframe>
    </div>
  </div>

  <div class="window glass hidden" id="window-chat" data-app-window data-app-id="chat">
    <div class="window-titlebar" data-drag-handle>
      <div class="window-controls">
        <button class="win-btn win-close" data-close>&nbsp;</button>
        <button class="win-btn win-minimize">&nbsp;</button>
        <button class="win-btn win-full">&nbsp;</button>
      </div>
      <span class="window-title">Liquid Aura Chat</span>
    </div>
    <div class="window-body">
      <iframe
        src="https://immlad.github.io/liquid-aura/#/app"
        title="Liquid Aura Chat"
        class="window-iframe"
      ></iframe>
    </div>
  </div>

  <!-- Placeholder windows for Ideas / Settings / Admin -->
  <div class="window glass hidden" id="window-ideas" data-app-window data-app-id="ideas">
    <div class="window-titlebar" data-drag-handle>
      <div class="window-controls">
        <button class="win-btn win-close" data-close>&nbsp;</button>
        <button class="win-btn win-minimize">&nbsp;</button>
        <button class="win-btn win-full">&nbsp;</button>
      </div>
      <span class="window-title">Ideas</span>
    </div>
    <div class="window-body window-body-placeholder">
      <p>Capture your ideas here soon.</p>
    </div>
  </div>

  <div class="window glass hidden" id="window-settings" data-app-window data-app-id="settings">
    <div class="window-titlebar" data-drag-handle>
      <div class="window-controls">
        <button class="win-btn win-close" data-close>&nbsp;</button>
        <button class="win-btn win-minimize">&nbsp;</button>
        <button class="win-btn win-full">&nbsp;</button>
      </div>
      <span class="window-title">Settings</span>
    </div>
    <div class="window-body window-body-placeholder">
      <p>Settings panel coming soon.</p>
    </div>
  </div>

  <div class="window glass hidden" id="window-admin" data-app-window data-app-id="admin">
    <div class="window-titlebar" data-drag-handle>
      <div class="window-controls">
        <button class="win-btn win-close" data-close>&nbsp;</button>
        <button class="win-btn win-minimize">&nbsp;</button>
        <button class="win-btn win-full">&nbsp;</button>
      </div>
      <span class="window-title">Admin</span>
    </div>
    <div class="window-body window-body-placeholder">
      <p>Admin dashboard (55) – placeholder.</p>
    </div>
  </div>

  <!-- Dock (still macOS-style) -->
  <nav class="dock glass">
    <div class="dock-inner">
      <button class="dock-item" data-app="nebulo">
        <img src="assets/app-default.png" alt="Nebulo" class="dock-icon app-icon" />
      </button>
      <button class="dock-item" data-app="chat">
        <img src="assets/app-default.png" alt="Liquid Aura" class="dock-icon app-icon" />
      </button>
      <button class="dock-item" data-app="settings">
        <img src="assets/app-default.png" alt="Settings" class="dock-icon app-icon" />
      </button>
    </div>
  </nav>
</body>
</html>
